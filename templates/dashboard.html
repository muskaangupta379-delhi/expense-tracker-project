<h2>Dashboard</h2>

<h3>Total: ₹ {{total}}</h3>

<form method="POST">
<input type="number" name="amount" required>
<select name="category">
<option>Food</option>
<option>Travel</option>
<option>Education</option>
<option>Shopping</option>
</select>
<button>Add</button>
</form>

<table>
<tr><th>Amount</th><th>Category</th></tr>
{% for row in data %}
<tr>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
</tr>
{% endfor %}
</table>
